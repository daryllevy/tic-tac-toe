<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main id="main">
      <div class="container">
        <div class="selection">
          <div class="X">
            <p class="X">X</p>
            <span class="X-score X">-</span>
          </div>
          <div class="O">
            <p class="O">O</p>
            <span class="O-score O">-</span>
          </div>
        </div>
        <p class="message">Select a player to start the game</p>
        <div class="board"></div>
      </div>
    </main>
  </body>
</html>
